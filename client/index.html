<!doctype html>
<html lang="en">
  <head>
    <style>
      html {
        background: #0c0f14;
        color: #f4f4f5;
        font-family: 'Geist Sans Fallback', system-ui, sans-serif;
      }
      html[data-theme="light"] {
        background: #f4f6f9;
        color: #1a2332;
      }
    </style>
    <script>
      try {
        if (localStorage.getItem('poly-trader-theme') === 'light') {
          document.documentElement.dataset.theme = 'light';
        }
      } catch (_) {}
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="preload"
      href="/fonts/geist-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/geist-mono-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>Poly Trader</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
