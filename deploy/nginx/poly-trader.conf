# Host nginx site for Poly Trader (Ubuntu 24.04).
# Replace YOUR_DOMAIN with your domain, then:
#   sudo ln -sf /opt/poly-trader/deploy/nginx/poly-trader.conf /etc/nginx/sites-available/poly-trader
#   sudo ln -sf /etc/nginx/sites-available/poly-trader /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d YOUR_DOMAIN

upstream polytrader_web {
    server 127.0.0.1:8081;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Certbot will add HTTPS redirect and SSL blocks here.

    client_max_body_size 10m;

    location / {
        proxy_pass http://polytrader_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /hubs/ {
        proxy_pass http://polytrader_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
